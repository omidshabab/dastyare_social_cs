name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dastyare-social-cs:latest
            ghcr.io/${{ github.repository_owner }}/dastyare-social-cs:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/dastyare-social-cs:latest
            docker stop dastyare-social-cs || true
            docker rm dastyare-social-cs || true
            docker run -d --name dastyare-social-cs -p 8729:8729 \
              --env-file /path/to/your/.env \
              ghcr.io/${{ github.repository_owner }}/dastyare-social-cs:latest
