name: CI — Lighthouse SEO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.26
      - name: Install dependencies
        run: |
          bun install || npm ci
      - name: Start server
        run: |
          bunx next build
          bun run start &
          sleep 5
      - name: Run Lighthouse (SEO)
        run: |
          npx -y lighthouse http://localhost:8729 --only-categories=seo --output=json --output-path=./lighthouse-seo.json --chrome-flags="--no-sandbox"
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-seo
          path: ./lighthouse-seo.json
