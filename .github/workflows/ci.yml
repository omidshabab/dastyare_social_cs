name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dastyare_social_cs
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d dastyare_social_cs"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dastyare_social_cs
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:8729
      NEXT_PUBLIC_APP_URL: http://localhost:8729
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_BUCKET: test-bucket
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.26

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Generate config
        run: bun run generate:config

      - name: Build application
        run: bun run db:migrate && bun run bootstrap:admin && bunx next build
