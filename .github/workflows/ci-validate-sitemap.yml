name: CI — Validate sitemap

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.26
      - name: Install dependencies
        run: |
          bun install || npm ci
      - name: Build app
        run: |
          bunx next build
      - name: Validate sitemap
        run: |
          node scripts/validate-sitemap.js
