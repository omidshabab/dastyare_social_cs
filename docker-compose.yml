services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dastyare-social-cs:latest
    ports:
      - "8729:8729"
    env_file:
      - .env
    depends_on:
      - db
      - rustfs
    restart: unless-stopped
    command: sh -c "bun run generate:config && bun run db:migrate && bun run bootstrap:admin && bun run start"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dastyare_social_cs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  # minio:
  #   image: minio/minio:latest
  #   command: server /data
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   ports:
  #     - "9000:9000"
  #   volumes:
  #     - minio-data:/data
  #   restart: unless-stopped

  # minio-createbuckets:
  #   image: minio/mc:latest
  #   depends_on:
  #     - minio
  #   entrypoint: >
  #     /bin/sh -c "
  #     until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 1; done;
  #     mc mb --ignore-existing local/dastyare-social-cs;
  #     exit 0;
  #     "

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    environment:
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    restart: unless-stopped

  rustfs-createbuckets:
    image: minio/mc:latest
    depends_on:
      - rustfs
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://rustfs:9000 minioadmin minioadmin) do echo 'waiting for rustfs...' && sleep 1; done;
      mc mb --ignore-existing local/dastyare-social-cs;
      exit 0;
      "

volumes:
  db-data:
  minio-data:
  rustfs-data: