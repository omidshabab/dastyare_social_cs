version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dastyare-social-cs-dev:latest
    ports:
      - "8729:8729"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - minio
    restart: unless-stopped
    command: sh -c "bun run generate:config && bun run db:migrate && bun run bootstrap:admin && bun run dev -p 8729"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dastyare_social_cs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  db-data:
  minio-data:
